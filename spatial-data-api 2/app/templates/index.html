<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система загрузки пространственных данных</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: #f4f6f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-card{
            width: 100%;
            max-width: 900px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: none;
        }

        .json-block{
            background: #1e1e1e;
            color: #00ff88;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 14px;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="card main-card p-4">

        <div class="card-body">

            <h1 class="text-center mb-4">
                Система загрузки пространственных данных
            </h1>

            <form action="/upload" method="post" enctype="multipart/form-data">

                <div class="mb-3">
                    <label class="form-label">
                        Выберите ZIP-файл с shapefile
                    </label>

                    <input
                        type="file"
                        class="form-control"
                        name="file"
                        accept=".zip"
                        required
                    >
                </div>

                <div class="d-grid">
                    <button class="btn btn-primary btn-lg">
                        Загрузить и обработать
                    </button>
                </div>

            </form>

            {% if result %}

                <hr class="my-4">

                {% if result.error %}

                    <div class="alert alert-danger">
                        {{ result.error }}
                    </div>

                {% else %}

                    <div class="alert alert-success">
                        {{ result.status }}
                    </div>

                    <div class="mb-3">
                        <strong>Имя файла:</strong>
                        {{ result.filename }}
                    </div>

                    <div class="mb-3">
                        <strong>Количество объектов:</strong>
                        {{ result.count }}
                    </div>

                    <h5 class="mb-3">
                        Первые 2 объекта GeoJSON
                    </h5>

                    <div class="json-block">
<pre>{{ result.preview | tojson(indent=2) }}</pre>
                    </div>

                {% endif %}

            {% endif %}

        </div>

    </div>

</div>

</body>
</html>
